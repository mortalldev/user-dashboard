name: Code Formatting

on:
    push:
        branches:
            - '**'
    pull_request:
        branches:
            - '**'

jobs:
    prettier:
        name: Code Formatting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Run Prettier check
              run: npx prettier --check .
